<article class="max-w-2xl mx-auto py-10 px-4">
  @if (user$ | async; as user) {
    <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden transition-all hover:shadow-md">

      <div class="h-24 bg-gradient-to-r from-blue-600 to-indigo-700"></div>

      <div class="px-8 pb-8">
        <div class="relative -mt-12 mb-6 flex justify-between items-end">
          <div class="relative">
            <div class="w-24 h-24 rounded-2xl bg-white p-1 shadow-lg">
              <div class="w-full h-full rounded-xl bg-slate-100 flex items-center justify-center text-3xl border border-slate-100">
              </div>
            </div>
            <span class="absolute bottom-1 right-1 w-5 h-5 border-4 border-white rounded-full"
                  [ngClass]="user.status === 'Active' ? 'bg-emerald-500' : 'bg-slate-400'">
            </span>
          </div>

          <span class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider shadow-sm"
                [ngClass]="{
                  'bg-emerald-100 text-emerald-700 border border-emerald-200': user.status === 'Active',
                  'bg-rose-100 text-rose-700 border border-rose-200': user.status === 'Inactive',
                  'bg-slate-100 text-slate-600 border border-slate-200': !user.status
                }">
            {{ user.status || 'Desconocido' }}
          </span>
        </div>

        <div class="space-y-1 mb-8">
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">{{ user.name }}</h2>
          <p class="text-blue-600 font-medium flex items-center gap-2">
            <span class="text-sm"></span> {{ user.role }}
          </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-slate-50 rounded-2xl border border-slate-100 mb-8">
          <div class="space-y-1">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Email</p>
            <p class="text-slate-700 font-medium truncate">{{ user.email }}</p>
          </div>

          <div class="space-y-1">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Último acceso</p>
            <p class="text-slate-700 font-medium italic">
              {{ user.lastLogin | date:'medium' }}
            </p>
          </div>
        </div>

        <button [routerLink]="['/user-edit', user.id]"
                class="w-full group flex items-center justify-center gap-3 px-6 py-4 bg-slate-900 hover:bg-blue-600 text-white font-bold rounded-2xl transition-all duration-300 shadow-xl shadow-slate-200 hover:shadow-blue-200 active:scale-[0.98]">
          <span>Editar Perfil</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>
      </div>
    </section>
  } @else {
    <div class="flex flex-col items-center justify-center space-y-4 animate-pulse">
      <div class="w-20 h-20 bg-slate-200 rounded-2xl"></div>
      <div class="h-4 w-48 bg-slate-200 rounded-full"></div>
      <p class="text-slate-400 font-medium italic">Sincronizando datos...</p>
    </div>
  }
</article>
