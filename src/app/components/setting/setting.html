<section class="max-w-4xl mx-auto py-10 px-6">
  <div class="mb-10">
    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Configuración del Sistema</h2>
    <p class="text-slate-500 mt-2 font-medium">Gestiona las preferencias generales y las alertas de tu panel administrativo.</p>
  </div>

  <form [formGroup]="settingsForm" (submit)="saveSettings()" class="space-y-8">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="p-8 space-y-6">

        <div class="flex flex-col gap-2">
          <label for="admin-name" class="text-sm font-bold text-slate-700 ml-1">
            Nombre del Administrador
          </label>
          <input
            id="admin-name"
            type="text"
            formControlName="adminName"
            class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all duration-200 text-slate-800 font-medium"
            placeholder="Ej. Alejandro Asencio">
        </div>

        <div class="flex flex-col gap-2">
          <label for="email" class="text-sm font-bold text-slate-700 ml-1">
            Email de Notificaciones
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all duration-200 text-slate-800 font-medium"
            placeholder="admin@tuempresa.com">
        </div>

        <hr class="border-slate-100 my-2">

        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 group transition-colors hover:bg-slate-100/50">
          <div class="flex flex-col">
            <label for="notifications" class="text-sm font-bold text-slate-800 cursor-pointer">
              Notificaciones por correo
            </label>
            <span class="text-xs text-slate-500">Recibe alertas críticas directamente en tu bandeja de entrada.</span>
          </div>

          <label class="relative inline-flex items-center cursor-pointer">
            <input id="notifications" type="checkbox" formControlName="notifications" class="sr-only peer">
            <div class="w-12 h-6 bg-slate-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-100 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
          </label>
        </div>

      </div>

      <div class="bg-slate-50/50 px-8 py-6 border-t border-slate-100 flex justify-end">
        <button
          type="submit"
          [disabled]="!settingsForm.valid"
          class="flex items-center gap-2 px-10 py-3.5 bg-slate-900 text-white font-bold rounded-2xl shadow-xl shadow-slate-200 transition-all duration-300 hover:bg-blue-600 hover:shadow-blue-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-slate-900 active:scale-95">
          <span>Guardar Cambios</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </button>
      </div>
    </div>
  </form>
</section>
