<section class="settings-page">
  <h2 class="section-heading">Configuración del Sistema</h2>

  <form [formGroup]="settingsForm" (submit)="saveSettings()">
    <div class="form-group">
      <label for="admin-name">Nombre del Administrador</label>
      <input id="admin-name" type="text" formControlName="adminName">
    </div>

    <div class="form-group">
      <label for="email">Email de Notificaciones</label>
      <input id="email" type="email" formControlName="email">
    </div>

    <div class="form-group checkbox-wrapper">
      <input id="notifications" type="checkbox" formControlName="notifications">
      <label for="notifications" class="checkbox-label">
        <span class="custom-checkbox"></span>
        Activar notificaciones por correo
      </label>
    </div>

    <button type="submit" class="primary" [disabled]="!settingsForm.valid">
      Guardar Cambios
    </button>
  </form>
</section>
