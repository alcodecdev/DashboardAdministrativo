<article class="user-container">
  @if (user$ | async; as user) {
    <section class="user-card edit-mode">
      <div class="user-header">
        <h2 class="user-name">Modificando: {{ user.name }}</h2>
      </div>

      <div class="user-form"> <div class="input-group">
        <label class="form-label">Nombre Completo</label>
        <input type="text" [(ngModel)]="user.name" class="form-control">
      </div>

        <div class="input-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" [(ngModel)]="user.email" class="form-control">
        </div>

        <div class="input-group">
          <label class="form-label">Rol del Usuario</label>
          <select [(ngModel)]="user.role" class="form-control">
            <option value="Admin">Admin</option>
            <option value="Super Admin">Super Admin</option>
            <option value="Editor">Editor</option>
            <option value="Observador">Observador</option>
            <option value="Operario">Operario</option>
          </select>
        </div>
      </div>

      <div class="user-actions">
        <button class="btn-save" (click)="save(user)">Guardar Cambios</button>
        <button class="btn-cancel" (click)="cancel(user.id)">Cancelar</button>
      </div>
    </section>
  } @else {
    <div class="loading-box">
      <p>Cargando datos del usuario...</p>
    </div>
  }
</article>
